  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI for Professionals - 4-Week Intensive Workshop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            midnight: '#07070a',
            surface: '#0f1014',
            elevated: '#16171d',
            floating: '#1e2028',
            accent: '#c9a84c',
            'accent-light': '#e8d48a',
            'accent-dim': '#8b7433',
            cream: '#f0ebe0',
            'cream-muted': '#c4bfb4',
            warm: '#2a2520',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['"Outfit"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #07070a;
      color: #f0ebe0;
      font-family: 'Outfit', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* Typography */
    .heading-display {
      font-family: 'Cormorant Garamond', Georgia, serif;
      letter-spacing: -0.03em;
      line-height: 0.95;
    }
    .body-text {
      font-family: 'Outfit', system-ui, sans-serif;
      line-height: 1.7;
    }

    /* Gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      will-change: transform;
    }
    .orb-gold { background: radial-gradient(circle, rgba(201,168,76,0.22) 0%, transparent 70%); }
    .orb-warm { background: radial-gradient(circle, rgba(180,120,60,0.15) 0%, transparent 70%); }
    .orb-blue { background: radial-gradient(circle, rgba(60,80,160,0.12) 0%, transparent 70%); }

    /* Layered shadows */
    .shadow-layered {
      box-shadow:
        0 1px 2px rgba(201,168,76,0.04),
        0 4px 8px rgba(0,0,0,0.3),
        0 16px 32px rgba(0,0,0,0.4),
        0 32px 64px rgba(0,0,0,0.2);
    }
    .shadow-card {
      box-shadow:
        0 2px 4px rgba(201,168,76,0.03),
        0 8px 16px rgba(0,0,0,0.25),
        0 24px 48px rgba(0,0,0,0.15);
    }

    /* Button styles */
    .btn-primary {
      background: linear-gradient(135deg, #c9a84c 0%, #a8873a 100%);
      color: #07070a;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 18px 48px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(201,168,76,0.3), 0 2px 8px rgba(201,168,76,0.2);
    }
    .btn-primary:hover::before { left: 100%; }
    .btn-primary:active { transform: translateY(0) scale(0.98); }
    .btn-primary:focus-visible {
      outline: 2px solid #e8d48a;
      outline-offset: 4px;
    }

    .btn-secondary {
      background: transparent;
      color: #c9a84c;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 16px 40px;
      border: 1px solid rgba(201,168,76,0.3);
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s ease, background 0.3s ease;
    }
    .btn-secondary:hover {
      border-color: #c9a84c;
      background: rgba(201,168,76,0.06);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: translateY(0); }
    .btn-secondary:focus-visible {
      outline: 2px solid #e8d48a;
      outline-offset: 4px;
    }

    /* Section label */
    .section-label {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9a84c;
      opacity: 0.85;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, #c9a84c, transparent);
    }

    /* Curriculum card */
    .week-card {
      background: linear-gradient(135deg, #13141a 0%, #1a1b23 100%);
      border: 1px solid rgba(201,168,76,0.12);
      position: relative;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.4s ease;
    }
    .week-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .week-card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,168,76,0.2);
    }
    .week-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .week-card:hover::before { opacity: 1; }

    /* Week number */
    .week-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 6rem;
      font-weight: 300;
      line-height: 1;
      color: rgba(201,168,76,0.1);
      position: absolute;
      top: -10px;
      right: 20px;
    }

    /* Stats counter */
    .stat-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      font-weight: 700;
      color: #c9a84c;
      line-height: 1;
    }
    .stat-suffix {
      font-size: 2rem;
      font-weight: 400;
      color: #e8d48a;
      margin-left: 2px;
    }
    .stat-label {
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c4bfb4;
      margin-top: 8px;
    }

    /* Testimonial */
    .testimonial-card {
      background: linear-gradient(160deg, #13141a 0%, #1a1b23 100%);
      border: 1px solid rgba(201,168,76,0.12);
    }

    /* FAQ */
    .faq-item {
      border-bottom: 1px solid rgba(201,168,76,0.15);
      cursor: pointer;
    }
    .faq-item:hover .faq-question { color: #c9a84c; }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .faq-item.active .faq-answer { max-height: 300px; }
    .faq-item.active .faq-icon { transform: rotate(45deg); }
    .faq-icon { transition: transform 0.3s ease; }

    /* Marquee */
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .marquee-track {
      animation: marquee 30s linear infinite;
    }

    /* Glow line */
    .glow-line {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #c9a84c 20%, #e8d48a 50%, #c9a84c 80%, transparent 100%);
      opacity: 0.5;
    }

    /* Hide scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #07070a; }
    ::-webkit-scrollbar-thumb { background: #2a2520; border-radius: 3px; }

    /* Animated gradient border for pricing */
    .pricing-border {
      background: linear-gradient(135deg, #c9a84c, #8b7433, #c9a84c, #e8d48a, #c9a84c);
      background-size: 400% 400%;
      animation: gradientShift 6s ease infinite;
      padding: 1px;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

  </style>
